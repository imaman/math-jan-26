<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f5f7;
        --ink: #21262d;
        --muted: #6b7280;
        --line: #d9dde3;
        --accent: #41506b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "IBM Plex Sans", sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding: clamp(2rem, 5vw, 4rem) 1.5rem;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
      }

      .doc-head {
        padding-bottom: 1.1rem;
        margin-bottom: 2.25rem;
        border-bottom: 2px solid var(--ink);
      }
      .doc-head .meta {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.55rem;
      }
      .doc-head h1 {
        font-weight: 600;
        font-size: clamp(1.5rem, 4vw, 2rem);
        letter-spacing: -0.015em;
      }

      .entry {
        padding-top: 1.6rem;
      }
      .entry + .entry {
        margin-top: 2.5rem;
        border-top: 1px solid var(--line);
      }

      .entry-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: baseline;
        gap: 0.9rem;
        margin-bottom: 1.1rem;
      }
      .entry-head .seq {
        font-family: "IBM Plex Mono", monospace;
        font-weight: 500;
        font-size: 0.82rem;
        color: var(--accent);
        padding: 0.1rem 0.45rem;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #fff;
      }
      .entry-head h2 {
        font-weight: 500;
        font-size: 1.1rem;
      }
      .entry-head .spec {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.76rem;
        color: var(--muted);
      }

      .frame {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #000;
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }
      .frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="doc-head">
        <p class="meta">Index · 2 entries</p>
        <h1>Clip list</h1>
      </div>

      <section class="entry">
        <div class="entry-head">
          <span class="seq">01</span>
          <h2>Clip One</h2>
          <span class="spec">0:38</span>
        </div>
        <div class="frame">
          <iframe
            src="https://www.youtube.com/embed/ry-Brbyi20k?end=38"
            title="Clip 1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section class="entry">
        <div class="entry-head">
          <span class="seq">02</span>
          <h2>Clip Two</h2>
          <span class="spec">0:59</span>
        </div>
        <div class="frame">
          <iframe
            src="https://www.youtube.com/embed/J4J-Fuo0vLE?end=59"
            title="Clip 2"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
