<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #131313;
        --panel: #1a1a1b;
        --ink: #e8e6e1;
        --muted: #8c8a85;
        --line: #2c2c2d;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Libre Franklin", sans-serif;
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding: clamp(2.5rem, 7vw, 6rem) 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(2.5rem, 6vw, 4.5rem);
      }

      header {
        text-align: center;
      }
      header .kicker {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.9rem;
      }
      header h1 {
        font-weight: 300;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        letter-spacing: -0.01em;
      }

      .clip {
        width: 100%;
        max-width: 900px;
      }

      .frame {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #000;
        border: 1px solid var(--line);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      }
      .frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .caption {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 1rem;
        padding-left: 0.1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .caption .n {
        font-weight: 500;
        color: var(--ink);
        letter-spacing: 0.05em;
      }
      .caption .dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <p class="kicker">Presentation</p>
      <h1>Two clips</h1>
    </header>

    <section class="clip">
      <div class="frame">
        <iframe
          src="https://drive.google.com/file/d/1RVT_PoG1U19Ef5QoH_fMzgd10qs0K6Cb/preview"
          title="Clip 1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
      <div class="caption">
        <span class="n">Clip 1</span>
      </div>
    </section>

    <section class="clip">
      <div class="frame">
        <iframe
          src="https://drive.google.com/file/d/1e2hqMYLJlkm7fuN8HLwry1Iz6-ZYeKTv/preview"
          title="Clip 2"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
      <div class="caption">
        <span class="n">Clip 2</span>
      </div>
    </section>
  </body>
</html>
