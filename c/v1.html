<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Newsreader:opsz,wght@6..72,300;6..72,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f4ec;
        --ink: #2b2722;
        --muted: #8a8174;
        --rule: #ddd6c7;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Newsreader", Georgia, serif;
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding: clamp(2rem, 6vw, 5.5rem) 1.5rem;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: clamp(2.5rem, 6vw, 4.5rem);
      }
      header .eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1rem;
      }
      header h1 {
        font-family: "Fraunces", serif;
        font-weight: 400;
        font-size: clamp(2.2rem, 6vw, 3.4rem);
        font-style: italic;
        line-height: 1.05;
      }
      header .divider {
        width: 44px;
        height: 1px;
        background: var(--ink);
        margin: 1.5rem auto 0;
        opacity: 0.5;
      }

      .clip + .clip { margin-top: clamp(3rem, 7vw, 5rem); }

      .clip-head {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding-bottom: 0.85rem;
        margin-bottom: 1.25rem;
        border-bottom: 1px solid var(--rule);
      }
      .clip-num {
        font-family: "Fraunces", serif;
        font-size: 1.4rem;
        line-height: 1;
        color: var(--muted);
      }
      .clip-title {
        font-family: "Fraunces", serif;
        font-weight: 500;
        font-size: 1.35rem;
      }
      .clip-meta {
        margin-left: auto;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .frame {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #000;
        border: 1px solid var(--rule);
      }
      .frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Viewing</p>
        <h1>Two short clips</h1>
        <div class="divider"></div>
      </header>

      <section class="clip">
        <div class="clip-head">
          <span class="clip-num">I</span>
          <span class="clip-title">Clip One</span>
          <span class="clip-meta">0:38</span>
        </div>
        <div class="frame">
          <iframe
            src="https://www.youtube.com/embed/ry-Brbyi20k?end=38"
            title="Clip 1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section class="clip">
        <div class="clip-head">
          <span class="clip-num">II</span>
          <span class="clip-title">Clip Two</span>
          <span class="clip-meta">0:59</span>
        </div>
        <div class="frame">
          <iframe
            src="https://www.youtube.com/embed/J4J-Fuo0vLE?end=59"
            title="Clip 2"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
