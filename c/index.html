<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentation Clips</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
        align-items: center;
      }

      .clip {
        width: 100%;
        max-width: 960px;
      }

      .clip h2 {
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #fff;
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        padding-top: 56.25%; /* 16:9 aspect ratio */
        background: #000;
        border-radius: 8px;
        overflow: hidden;
      }

      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="clip">
      <h2>Clip 1</h2>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/ry-Brbyi20k?end=38"
          title="Clip 1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <div class="clip">
      <h2>Clip 2</h2>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/J4J-Fuo0vLE?end=59"
          title="Clip 2"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </body>
</html>
