<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Mulish:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #eef0e9;
        --card: #f8f9f4;
        --ink: #34382f;
        --muted: #7c8270;
        --accent: #97a07f;
        --shadow: 28px 28px 60px rgba(80, 86, 66, 0.10);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        background: radial-gradient(120% 90% at 50% 0%, #f2f3ec 0%, var(--bg) 60%);
        color: var(--ink);
        font-family: "Mulish", sans-serif;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        padding: clamp(2rem, 6vw, 5rem) 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1.75rem, 4vw, 2.75rem);
      }

      header {
        text-align: center;
        max-width: 560px;
      }
      header h1 {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: clamp(2.4rem, 7vw, 3.6rem);
        line-height: 1.1;
        letter-spacing: 0.01em;
      }
      header p {
        margin-top: 0.6rem;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .card {
        width: 100%;
        max-width: 880px;
        background: var(--card);
        border-radius: 22px;
        padding: clamp(1rem, 2.5vw, 1.5rem);
        box-shadow: var(--shadow);
      }

      .card-head {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.35rem 0.4rem 1rem;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        flex: none;
      }
      .card-head h2 {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: 1.55rem;
      }
      .card-head .time {
        margin-left: auto;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .frame {
        position: relative;
        width: 100%;
        padding-top: 56.25%;
        background: #000;
        border-radius: 14px;
        overflow: hidden;
      }
      .frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>A couple of clips</h1>
      <p>Two short videos for today.</p>
    </header>

    <article class="card">
      <div class="card-head">
        <span class="chip">1</span>
        <h2>Clip One</h2>
      </div>
      <div class="frame">
        <iframe
          src="https://drive.google.com/file/d/1RVT_PoG1U19Ef5QoH_fMzgd10qs0K6Cb/preview"
          title="Clip 1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </article>

    <article class="card">
      <div class="card-head">
        <span class="chip">2</span>
        <h2>Clip Two</h2>
      </div>
      <div class="frame">
        <iframe
          src="https://drive.google.com/file/d/1e2hqMYLJlkm7fuN8HLwry1Iz6-ZYeKTv/preview"
          title="Clip 2"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </article>
  </body>
</html>
